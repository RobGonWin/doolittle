name: roblox-governance

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: roblox-governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit --pretty false

      - name: Targeted formatting and lint
        run: >
          bunx @biomejs/biome check
          packages/agent/src/services/roblox-governance-mcp/submission.test.ts
          packages/agent/src/services/roblox-governance-mcp/tool-definitions.ts
          packages/agent/src/services/roblox-governance-mcp/server.ts
          packages/agent/src/server/routes/roblox-governance-mcp.test.ts
          docs/roblox-governance-mcp.md
          docs/roblox-studio-mcp-boundary.md
          docs/chatgpt-developer-mode-proof.md
          docs/data-governance-proof.md
          chatgpt-app-submission.json

      - name: MCP governance tests
        run: >
          bun test
          packages/agent/src/services/roblox-governance-mcp/submission.test.ts
          packages/agent/src/server/routes/roblox-governance-mcp.test.ts
          packages/agent/src/server/auth.test.ts

      - name: Roblox scanner governance tests
        run: >
          python -m unittest -v
          packages/skills/roblox/telemetry-evidence/scripts/test_audit_roblox_repo.py
          packages/skills/roblox/group-access/scripts/test_audit_discord_governance.py
